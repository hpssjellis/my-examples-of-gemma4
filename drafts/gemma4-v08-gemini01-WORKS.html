<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gemma 4 — Transformers.js v4</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { font-size: 1.2em; }
    #status { color: #555; margin: 8px 0; min-height: 1.4em; }
    #progress { width: 100%; height: 6px; background: #ddd; border-radius: 3px; margin: 6px 0; display: none; }
    #progress-bar { height: 100%; background: #4a90d9; border-radius: 3px; width: 0%; transition: width 0.2s; }
    #chat { background: white; border: 1px solid #ccc; border-radius: 4px; padding: 12px; min-height: 200px; max-height: 500px; overflow-y: auto; margin: 12px 0; white-space: pre-wrap; font-size: 0.9em; line-height: 1.5; }
    #input-row { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 8px; font-family: monospace; font-size: 0.95em; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; font-family: monospace; cursor: pointer; border: 1px solid #888; border-radius: 4px; background: white; }
    button:disabled { opacity: 0.5; cursor: default; }
    #send-btn { background: #4a90d9; color: white; border-color: #4a90d9; }
    #stop-btn { background: #d94a4a; color: white; border-color: #d94a4a; display: none; }
    details { margin: 12px 0; font-size: 0.85em; color: #555; }
    details summary { cursor: pointer; }
    label { display: block; margin: 4px 0; }
    input[type=number] { width: 80px; padding: 3px; font-family: monospace; }
    select { padding: 3px; font-family: monospace; }
    #tokens { font-size: 0.8em; color: #888; margin: 4px 0; }
    .user { color: #1a5276; }
    .assistant { color: #1a4a1a; }
    .system { color: #888; font-style: italic; }
    #model-input { width: 100%; padding: 4px; font-family: monospace; font-size: 0.85em; margin: 4px 0; box-sizing: border-box; }
  </style>
</head>
<body>

<h1>Gemma 4 · Transformers.js v4.0.1</h1>

<div id="status">Loading library…</div>
<div id="progress"><div id="progress-bar"></div></div>

<details>
  <summary>⚙ Settings</summary>
  <label>Model ID: <input id="model-input" value="onnx-community/gemma-4-E2B-it-ONNX"></label>
  <label>Max new tokens: <input type="number" id="max-tokens" value="512" min="64" max="2048"></label>
  <label>Temperature: <input type="number" id="temperature" value="1.0" min="0.1" max="2.0" step="0.1"></label>
  <label>Device:
    <select id="device">
      <option value="webgpu" selected>webgpu</option>
      <option value="wasm">wasm (CPU)</option>
    </select>
  </label>
  <label>Dtype:
    <select id="dtype">
      <option value="q4" selected>q4</option>
      <option value="q4f16">q4f16</option>
      <option value="fp16">fp16</option>
      <option value="fp32">fp32</option>
    </select>
  </label>
  <button onclick="window.myReload()">Reload model</button>
  <button onclick="window.myClear()">Clear chat</button>
</details>

<div id="chat"><span class="system">Model not yet loaded. Waiting for first message…</span></div>
<div id="tokens"></div>

<div id="input-row">
  <input id="user-input" type="text" placeholder="Type a message and press Enter or Send" disabled>
  <button id="send-btn" onclick="window.mySend()" disabled>Send</button>
  <button id="stop-btn" onclick="window.myStop()">Stop</button>
</div>

<script type="module">
// ── Config ──────────────────────────────────────────────────────────────────
const CDN = 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.1';

// ── State ────────────────────────────────────────────────────────────────────
let pipe = null;
let history = [];       // [{role, content}]
let generating = false;
let stopRequested = false;
let t0 = 0;
let tokCount = 0;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const statusEl   = document.getElementById('status');
const progressEl = document.getElementById('progress');
const barEl      = document.getElementById('progress-bar');
const chatEl     = document.getElementById('chat');
const inputEl    = document.getElementById('user-input');
const sendBtn    = document.getElementById('send-btn');
const stopBtn    = document.getElementById('stop-btn');
const tokensEl   = document.getElementById('tokens');

// ── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(msg) { statusEl.textContent = msg; }

function appendChat(role, text) {
  const div = document.createElement('div');
  div.className = role;
  div.textContent = (role === 'user' ? '▶ You: ' : role === 'assistant' ? '◀ Gemma: ' : '') + text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function clearChat() {
  chatEl.innerHTML = '';
  history = [];
  tokensEl.textContent = '';
}

// ── Load model ────────────────────────────────────────────────────────────────
async function loadModel() {
  const { pipeline, env } = await import(CDN);

  // Show raw CDN version for debugging
  setStatus(`Transformers.js loaded. Initialising model…`);

  const modelId = document.getElementById('model-input').value.trim();
  const device   = document.getElementById('device').value;
  const dtype    = document.getElementById('dtype').value;

  setStatus(`Loading ${modelId} (device=${device}, dtype=${dtype}) — first run downloads ~1–2 GB…`);
  progressEl.style.display = 'block';
  barEl.style.width = '0%';

  try {
    pipe = await pipeline('text-generation', modelId, {
      device,
      dtype,
      progress_callback(p) {
        if (p.status === 'progress') {
          const pct = p.progress ?? 0;
          barEl.style.width = pct.toFixed(1) + '%';
          setStatus(`Downloading ${p.file ?? ''} — ${pct.toFixed(1)}%`);
        } else if (p.status === 'done') {
          setStatus(`Loaded: ${p.file ?? ''}`);
        } else if (p.status === 'ready') {
          setStatus('Model ready ✓');
        }
      }
    });
  } catch (err) {
    setStatus('Error loading model: ' + err.message);
    console.error(err);
    return;
  }

  progressEl.style.display = 'none';
  barEl.style.width = '0%';
  setStatus('Model ready ✓  (cached after first download)');
  chatEl.innerHTML = '';
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ── Send message ──────────────────────────────────────────────────────────────
async function send() {
  if (!pipe || generating) return;
  const myText = inputEl.value.trim();
  if (!myText) return;

  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  stopBtn.style.display = 'inline-block';
  generating = true;
  stopRequested = false;
  tokCount = 0;
  t0 = performance.now();

  history.push({ role: 'user', content: myText });
  appendChat('user', myText);
  const myAssistantDiv = appendChat('assistant', '…');

  const myMaxTokens = parseInt(document.getElementById('max-tokens').value) || 512;
  const myTemperature = parseFloat(document.getElementById('temperature').value) || 1.0;

  try {
    // In Transformers.js v4, passing the history array directly allows the library 
    // to use the model's internal chat template automatically.
    const myResult = await pipe(history, {
      max_new_tokens: myMaxTokens,
      temperature: myTemperature,
      do_sample: myTemperature !== 1.0,
      callback_function: (beams) => {
        if (stopRequested) return true;
        tokCount++;
        
        const myElapsed = (performance.now() - t0) / 1000;
        tokensEl.textContent = `${tokCount} tokens · ${(tokCount / myElapsed).toFixed(1)} tok/s`;
        return false;
      }
    });

    // Extract the content from the last message in the returned conversation array
    const myFinalContent = myResult[0].generated_text.at(-1).content;

    myAssistantDiv.textContent = '◀ Gemma: ' + myFinalContent;
    history.push({ role: 'assistant', content: myFinalContent });

  } catch (err) {
    myAssistantDiv.textContent = '◀ Gemma: [Error] ' + err.message;
    console.error(err);
  }

  const myTotalElapsed = (performance.now() - t0) / 1000;
  tokensEl.textContent = `${tokCount} tokens · ${(tokCount / myTotalElapsed).toFixed(1)} tok/s · ${myTotalElapsed.toFixed(1)}s`;

  generating = false;
  stopRequested = false;
  stopBtn.style.display = 'none';
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();}

// ── Stop ──────────────────────────────────────────────────────────────────────
function stop() {
  stopRequested = true;
  setStatus('Stopping…');
}

// ── Reload ────────────────────────────────────────────────────────────────────
async function reload() {
  pipe = null;
  clearChat();
  inputEl.disabled = true;
  sendBtn.disabled = true;
  await loadModel();
}

// ── Keyboard shortcut ─────────────────────────────────────────────────────────
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// ── Expose to onclick handlers ────────────────────────────────────────────────
window.mySend   = send;
window.myStop   = stop;
window.myReload = reload;
window.myClear  = clearChat;

// ── Auto-load on page open ────────────────────────────────────────────────────
loadModel();
</script>

</body>
</html>
